# Process Flow Document v1.0
# Generated by Flow Designer
# Task: Convert delegate_gate.py budget-exhaustion HARD BLOCK (exit 2) into a
#       NON-BLOCKING ADVISORY (additionalContext + exit 0), and retire the
#       .delegate_mode bypass machinery.
# Verified against deployed code: ~/.claude/scripts/delegate_gate.py (read 2026-05-30),
#   require_task.py:70-72 (advisory pattern), _gate_common.py:66-70 (DECISION constants),
#   gate_stats.py:170-196 (downstream block-rate consumer), test_delegate_gate_msg.sh.

meta:
  task: "delegate_gate budget exhaustion: exit 2 (hard block) -> exit 0 + additionalContext advisory; remove .delegate_mode bypass"
  temporal_class: "branching"
  time_horizon: "single hook invocation (1-50ms) within a parallel tool-batch window (sibling calls fire ~concurrently, harness cancels the whole batch on any non-zero exit)"
  critical_state_vars:
    - ".delegate_counter (fcntl-locked int)"
    - "stdin payload (PreToolUse JSON)"
    - "stdout (advisory JSON channel)"
    - "exit code (0 allow / 2 block — the load-bearing signal to the harness)"
    - ".delegate_mode (bypass file — being retired)"
    - ".phase file (RECON/PLAN exemption)"

# ---------------------------------------------------------------------------
# Section 1: Ordered temporal phases
# ---------------------------------------------------------------------------
timeline:
  - phase: "stdin_ingest"
    duration: "<1ms"
    state_at_entry:
      stdin: "raw PreToolUse JSON or garbage"
    operations:
      - op: "sys.stdin.read() + json.loads"
        outcomes:
          - label: "valid_dict"
            probability: "high (~99.9%)"
            state_delta:
              data: "parsed dict"
            next_phase: "early_exits"
          - label: "malformed_or_non_dict"
            probability: "low (<0.1%, adversarial/corrupt)"
            state_delta:
              parse_ok: "False"
            next_phase: "terminal_fail_closed"
            recovery: "none — fail-closed exit 2 is INTENTIONAL and STAYS (robustness, not workflow). Lines ~602-611 must be untouched."

  - phase: "early_exits"
    duration: "<1ms"
    state_at_entry:
      data: "valid dict"
      counter: "read unlocked for telemetry (base['counter'])"
    operations:
      - op: "sub-agent auto-skip (is_subagent_context)"
        outcomes:
          - label: "is_subagent"
            probability: "medium (every sub-agent tool call)"
            state_delta:
              decision: "AUTO_SKIP"
            next_phase: "terminal_allow"
            recovery: "MUST keep auto-skip. MUST remove the inner _mode_disabled() bypass-attempt logging (SECONDARY change) WITHOUT removing the auto-skip itself."
          - label: "not_subagent"
            probability: "high (Lead context)"
            state_delta: {}
            next_phase: "env_bypass"
      - op: "env CLAUDE_BOOSTER_SKIP_DELEGATE_GATE check"
        outcomes:
          - label: "env_set"
            probability: "low"
            state_delta:
              decision: "ALLOW"
            next_phase: "terminal_allow"
            recovery: "MUST keep — this env escape is the only retained bypass."
          - label: "env_unset"
            probability: "high"
            state_delta: {}
            next_phase: "mode_file_bypass_REMOVED"
      - op: "_mode_disabled(.delegate_mode) — BEING DELETED"
        outcomes:
          - label: "branch_removed"
            probability: "100% after change"
            state_delta:
              note: "this entire branch (lines ~653-666) and _mode_disabled() func (~501-522) and MODE_FILE_REL (~131) are removed; flow falls straight through to phase exemption"
            next_phase: "phase_exempt"
            recovery: "REVERSE risk: any test asserting bypass-honoured now fails — see F7."

  - phase: "phase_exempt"
    duration: "<1ms (one file read)"
    state_at_entry:
      phase_file: "RECON | PLAN | other | absent"
    operations:
      - op: "_current_phase + EXEMPT_PHASES check"
        outcomes:
          - label: "RECON_or_PLAN"
            probability: "medium"
            state_delta:
              counter: "reset to 0"
              decision: "ALLOW"
            next_phase: "terminal_allow"
          - label: "other_or_absent"
            probability: "high"
            state_delta: {}
            next_phase: "delegation_and_recon"

  - phase: "delegation_and_recon"
    duration: "<2ms (regex matching)"
    state_at_entry:
      tool: "Bash | Agent | TaskCreate | Edit | Write | NotebookEdit | other"
    operations:
      - op: "DELEGATION_TOOLS / supervisor / codex_worker reset; recon-bash allow; non-ACTION allow; path allowlist allow"
        outcomes:
          - label: "delegation_signal"
            probability: "medium"
            state_delta:
              counter: "reset to 0"
              decision: "ALLOW"
            next_phase: "terminal_allow"
            recovery: "MUST be preserved byte-for-byte — counter reset on Agent/TaskCreate is acceptance criterion (7). This is the mechanism that makes the advisory self-clearing."
          - label: "recon_or_allowlist_or_free_tool"
            probability: "high"
            state_delta:
              decision: "ALLOW"
            next_phase: "terminal_allow"
          - label: "counted_action"
            probability: "medium (Edit/Write/non-recon Bash by Lead)"
            state_delta: {}
            next_phase: "budget_decision"

  - phase: "budget_decision"
    duration: "<1ms (fcntl lock + read + maybe write)"
    state_at_entry:
      counter: "current locked value"
      budget: "1 (BUDGET env or default)"
    operations:
      - op: "_atomic_check_and_increment(root, BUDGET)"
        outcomes:
          - label: "within_budget"
            probability: "first action after delegation"
            state_delta:
              counter: "+= 1"
              incremented: "True"
              decision: "ALLOW"
            next_phase: "terminal_allow"
            recovery: "unchanged — within-budget allow path stays exit 0."
          - label: "over_budget (incremented=False, NO mutation)"
            probability: "second+ action without delegating"
            state_delta:
              counter: "UNCHANGED (returns (current, False))"
              decision: "ADVISORY (was BLOCK)"
            next_phase: "terminal_advisory_NEW"
            recovery: "THE CHANGE: emit additionalContext JSON to stdout, log DECISION_ADVISORY, return 0. NEVER return 2. NEVER write stderr (stderr+exit0 is harmless but the contract says additionalContext)."

  - phase: "terminal_advisory_NEW"
    duration: "<1ms"
    state_at_entry:
      counter_val: "current over-budget count"
    operations:
      - op: "print(json.dumps({'additionalContext': <nudge>})) ; log ADVISORY ; return 0"
        outcomes:
          - label: "stdout_write_ok"
            probability: "high"
            state_delta:
              exit: "0"
              stdout: "valid single-line JSON with key additionalContext"
            next_phase: "terminal_allow"
          - label: "stdout_write_fails (BrokenPipe / OSError on flush)"
            probability: "very low"
            state_delta:
              exit: "must STILL be 0 — a failed advisory write must NOT degrade to exit 2"
            next_phase: "terminal_allow"
            recovery: "wrap print in try/except OSError: pass — see F4. Mirror require_task._emit_advisory which itself does NOT guard, but delegate_gate is on the hot path of parallel batches so guard it."

  - phase: "terminal_allow"
    duration: "instantaneous"
    state_at_entry: {}
    operations:
      - op: "return 0"
        outcomes:
          - label: "harness_proceeds"
            probability: "100%"
            state_delta: {}
            next_phase: "DONE"

  - phase: "terminal_fail_closed"
    duration: "instantaneous"
    state_at_entry:
      parse_ok: "False"
    operations:
      - op: "log DECISION_BLOCK + stderr + return 2"
        outcomes:
          - label: "blocked"
            probability: "100% on malformed stdin"
            state_delta:
              exit: "2"
            next_phase: "DONE"
            recovery: "INTENTIONAL. This exit-2 STAYS. Acceptance criterion (4)."

# ---------------------------------------------------------------------------
# Section 2: State variable inventory
# ---------------------------------------------------------------------------
state_variables:
  - name: ".delegate_counter"
    location: "<project_root>/.claude/.delegate_counter ; logic delegate_gate.py:448-481"
    temporal_class: "ACCUMULATING"
    current_value: "int >= 0, fcntl-locked"
    projection_at_T: "+1 per counted Lead action; reset to 0 on any delegation signal (Agent/TaskCreate/supervisor/codex)"
    source_or_derived: "source"
    freshness_window: "valid until next locked read-modify-write; unlocked telemetry read (base['counter'], line ~621) may be stale by the time the locked check runs at ~710"
    depends_on: []
    cascade_depth: 1
    recompute_trigger: "delegation signal resets it; counted action increments it"

  - name: "stdin payload"
    location: "delegate_gate.py:587-611"
    temporal_class: "STATIC"
    current_value: "PreToolUse JSON for this single invocation"
    projection_at_T: null
    source_or_derived: "source"
    freshness_window: "lifetime of the process"
    depends_on: []
    cascade_depth: 0
    recompute_trigger: "n/a"

  - name: "exit code"
    location: "delegate_gate.py return values (0/2)"
    temporal_class: "STATIC"
    current_value: "0 or 2"
    projection_at_T: null
    source_or_derived: "derived"
    freshness_window: "consumed once by harness"
    depends_on: ["budget_decision outcome", "parse_ok"]
    cascade_depth: 3
    recompute_trigger: "n/a — THE load-bearing signal. Changing the over-budget value from 2->0 is the entire point; it propagates to harness sibling-cancellation behavior."

  - name: "stdout (advisory channel)"
    location: "NEW write at budget-exhaustion branch (mirror require_task.py:72)"
    temporal_class: "STATIC"
    current_value: "empty today (gate writes only stderr); becomes JSON {additionalContext} on over-budget after change"
    projection_at_T: null
    source_or_derived: "derived"
    freshness_window: "consumed once by harness as additionalContext"
    depends_on: ["over_budget branch reached"]
    cascade_depth: 1
    recompute_trigger: "n/a — MUST be the ONLY thing on stdout in that branch (no prior print/debug to stdout, else JSON corrupts — see F3)"

  - name: ".delegate_mode"
    location: "<project_root>/.claude/.delegate_mode ; _mode_disabled() delegate_gate.py:501-522"
    temporal_class: "STATIC (within a session) — being RETIRED"
    current_value: "'off:<session_id>' or absent"
    projection_at_T: "INERT after change — file may still exist on disk but is never read"
    source_or_derived: "source"
    freshness_window: "n/a post-change"
    depends_on: []
    cascade_depth: 0
    recompute_trigger: "n/a — reads removed; stale files on disk become harmless no-ops"

  - name: ".phase file"
    location: "<project_root>/.claude/.phase ; _current_phase() :387-400"
    temporal_class: "PERIODIC"
    current_value: "RECON|PLAN|IMPLEMENT|... or absent"
    projection_at_T: "changes with /phase command across the session"
    source_or_derived: "source"
    freshness_window: "until next /phase"
    depends_on: []
    cascade_depth: 1
    recompute_trigger: "user runs /phase — UNCHANGED by this task"

  - name: "DECISION_ADVISORY constant"
    location: "_gate_common.py (NEW, after DECISION_BYPASS_REFUSED)"
    temporal_class: "STATIC"
    current_value: "does not exist yet"
    projection_at_T: null
    source_or_derived: "source"
    freshness_window: "compile-time"
    depends_on: []
    cascade_depth: 2
    recompute_trigger: "n/a — new module-level string 'advisory'; imported by delegate_gate; test stub may need it too (F7)"

# ---------------------------------------------------------------------------
# Section 3: Branching scenarios per operation
# ---------------------------------------------------------------------------
branching_scenarios:
  - operation: "budget exhaustion decision (the CORE change)"
    outcomes:
      - branch: "happy_path"
        probability: "common"
        state_after: "over-budget action allowed to proceed; Lead sees a nudge in next-turn additionalContext; counter unchanged"
        downstream_effects:
          - affected: "sibling tool calls in same parallel batch"
            effect: "NO LONGER CANCELLED — this is the whole fix (see F1)"
            blast_radius: "SESSION"
      - branch: "double_advisory"
        guide_word: "MORE"
        probability: "medium (parallel batch with 2+ over-budget actions)"
        state_after: "two concurrent invocations both read counter>=budget (neither mutates), both emit additionalContext"
        downstream_effects:
          - affected: "Lead context"
            effect: "duplicate nudge text — cosmetic, NOT a correctness bug; harness merges additionalContext per-call"
            blast_radius: "SESSION"
        recovery:
          mechanism: "NONE"
          exists_in_code: true
          gap: "acceptable — idempotent advisory, no state corruption. Do NOT add locking to dedup; that reintroduces serialization cost the fix removed."
      - branch: "stdout_corrupted_by_prior_write"
        guide_word: "OTHER"
        probability: "low"
        state_after: "if any code path printed to stdout before the advisory branch, the JSON line is preceded by garbage and harness fails to parse additionalContext"
        downstream_effects:
          - affected: "harness additionalContext parser"
            effect: "nudge silently dropped (best case) or harness error (worst case)"
            blast_radius: "SESSION"
        recovery:
          mechanism: "NONE"
          exists_in_code: false
          gap: "MUST verify the gate writes NOTHING to stdout on any path except this single advisory print. Today it uses only stderr — preserve that invariant. See INV-3."

  - operation: ".delegate_mode bypass removal"
    outcomes:
      - branch: "happy_path"
        probability: "common"
        state_after: "stale .delegate_mode files ignored; no BYPASS_HONOURED log emitted"
        downstream_effects:
          - affected: "gate_bypass_attempts.jsonl"
            effect: "no new BYPASS_HONOURED/BYPASS_REFUSED rows from delegate_gate (sub-agent attempt logging removed too)"
            blast_radius: "RECORD"
      - branch: "test_asserts_bypass_works"
        guide_word: "REVERSE"
        probability: "medium"
        state_after: "an existing tests/test_delegate_gate_*.sh that writes .delegate_mode=off and asserts exit 0 via bypass now passes for the WRONG reason (or fails if it asserts the BYPASS_HONOURED log line)"
        downstream_effects:
          - affected: "test suite A3 (test_delegate_gate_msg.sh runs all test_delegate_gate_*.sh)"
            effect: "false pass or hard fail"
            blast_radius: "SESSION"
        recovery:
          mechanism: "MANUAL"
          exists_in_code: false
          gap: "MUST grep tests/ for .delegate_mode / bypass_honoured assertions and update/remove them as part of this change. See F7, D7."

  - operation: "downstream metric consumption (gate_stats.py)"
    outcomes:
      - branch: "block_rate_goes_to_zero"
        guide_word: "OTHER"
        probability: "high (after change)"
        state_after: "gate_stats.py:186 budget_hit_rate = block/(block+allow) — block count for delegate gate drops to ~0 because over-budget now logs 'advisory' not 'block'"
        downstream_effects:
          - affected: "gate_stats.py budget-hit / block-rate report"
            effect: "metric reads near-0, looks like the gate stopped firing — it didn't, it went advisory"
            blast_radius: "SYSTEM (observability)"
        recovery:
          mechanism: "MANUAL"
          exists_in_code: false
          gap: "gate_stats.py is OUT OF SCOPE per contract, so this cascade is a KNOWN, DOCUMENTED side-effect — Worker MUST note it in the handover, not silently leave a misleading metric. Flag for a follow-up task: teach gate_stats to count 'advisory'."

# ---------------------------------------------------------------------------
# Section 4: HAZOP-derived failure enumeration
# ---------------------------------------------------------------------------
failure_modes:
  - id: "F1"
    guide_word: "NO / PARTIAL"
    operation: "over-budget hard block (exit 2) inside a parallel tool-batch"
    trigger: "Lead fires a parallel batch: [setup-Bash (over budget), Agent spawn x N]. The setup-Bash hits budget exhaustion, returns exit 2. The harness CANCELS every sibling call in the same batch — including the Agent spawns that would have RESET the counter."
    affected_state: ["sibling Agent spawns", ".delegate_counter (stays stuck >=budget)", "Lead workflow"]
    detection: "delegate_gate_decisions.jsonl shows DECISION_BLOCK immediately followed by a vanished/cancelled Agent batch; 14k+ .delegate_mode bypass events in history are the human reaction to this trap"
    downstream_impact: "Deadlock-ish: the only action that clears the budget (delegation) is cancelled by the block on a sibling, so the Lead must bypass to make progress. Generates the bypass traffic the task exists to eliminate."
    mitigation: "PRIMARY CHANGE: over-budget returns 0 (advisory), never 2. No non-zero exit in a normal batch -> harness never cancels siblings -> the Agent spawn proceeds and resets the counter. THIS IS THE FAILURE THE CHANGE ELIMINATES."
    category: "branch_unhandled"

  - id: "F2"
    guide_word: "OTHER"
    operation: "malformed-stdin fail-closed branch (lines ~602-611)"
    trigger: "Worker mistakes the malformed-payload exit 2 for a 'workflow block' and converts it to advisory too"
    affected_state: ["exit code on garbage stdin"]
    detection: "feeding non-JSON to the gate returns 0 instead of 2"
    downstream_impact: "Adversarial/corrupt stdin silently bypasses the gate (tool_name='' -> not in ACTIONS -> allow). Loses fail-closed robustness."
    mitigation: "Worker MUST touch ONLY the budget-exhaustion branch (~711-719). The parse-fail branch (~602-611) returns 2 and STAYS. Acceptance criterion (4)."
    category: "invariant_violation"

  - id: "F3"
    guide_word: "EARLY / OTHER"
    operation: "advisory stdout emit"
    trigger: "Some other code path writes to stdout before (or after) the advisory JSON, or a debug print sneaks in, corrupting the single-JSON-line contract"
    affected_state: ["stdout buffer"]
    detection: "stdout of over-budget invocation is not exactly one parseable JSON object with key additionalContext"
    downstream_impact: "Harness cannot parse additionalContext; nudge dropped or harness errors. Could even crash the turn."
    mitigation: "MUST ensure the advisory print is the ONLY stdout write on that path. The gate currently writes ONLY stderr — preserve. Verify with a test that captures stdout and json.loads it cleanly (INV-3)."
    category: "partial_commit"

  - id: "F4"
    guide_word: "PARTIAL / LATE"
    operation: "print(json.dumps(...)) flush"
    trigger: "stdout pipe closed early by harness -> BrokenPipeError/OSError on print or implicit flush at interpreter exit"
    affected_state: ["exit code"]
    detection: "Python emits 'Exception ignored in: ... BrokenPipeError' and process exits non-zero (could be read by harness as a block)"
    downstream_impact: "A failed advisory write degrades into a non-zero exit -> reintroduces the sibling-cancellation cascade the change was meant to kill. Catastrophic regression of the fix itself."
    mitigation: "Wrap the advisory emit in try/except OSError: pass, then unconditionally return 0. Do NOT let a stdout failure change the exit code. (require_task._emit_advisory does not guard, but delegate_gate runs on the hot parallel-batch path, so guard it explicitly.)"
    category: "race_condition"

  - id: "F5"
    guide_word: "MORE"
    operation: "concurrent over-budget invocations on shared counter"
    trigger: "Two parallel calls both read counter>=budget. _atomic_check_and_increment returns (current, False) for both WITHOUT mutating."
    affected_state: [".delegate_counter (correctly unchanged)", "stdout (two advisories)"]
    detection: "two DECISION_ADVISORY rows with identical counter value in the same ms window"
    downstream_impact: "Duplicate nudge text only. No state corruption (the lock still serializes the read; both correctly see over-budget and both correctly decline to mutate)."
    mitigation: "ACCEPT. Idempotent. No fix needed. Worker MUST NOT add dedup locking — that would reserialize and defeat the parallelism the change enables."
    category: "race_condition"

  - id: "F6"
    guide_word: "REVERSE"
    operation: "removal of sub-agent bypass-attempt logging (inside is_subagent branch)"
    trigger: "Worker removes the sub-agent AUTO_SKIP along with the bypass-attempt logging, or removes is_subagent_context entirely"
    affected_state: ["sub-agent tool calls"]
    detection: "a sub-agent's Edit/Bash now hits the budget counter and gets advisory nudges, or worse mutates the Lead's counter"
    downstream_impact: "Sub-agents pollute the Lead's counter / receive spurious nudges; dep_guard auto-skip parity broken."
    mitigation: "MUST keep the is_subagent auto-skip (return 0). Remove ONLY the inner _mode_disabled() bypass-attempt detection+logging block, not the auto-skip itself."
    category: "branch_unhandled"

  - id: "F7"
    guide_word: "REVERSE"
    operation: "removing _mode_disabled / BYPASS_HONOURED / BYPASS_REFUSED usage + adding DECISION_ADVISORY"
    trigger: "Existing tests assert bypass-honoured behavior, exit-2 on over-budget, or import DECISION_BYPASS_* / lack DECISION_ADVISORY in their _gate_common stub (test_delegate_gate_msg.sh stub at lines 47-52, 80-85)"
    affected_state: ["test suite (A1/A2/A3)", "test stub modules"]
    detection: "test_delegate_gate_msg.sh A3 fails; or an over-budget test still asserting rc==2 fails; or import error for DECISION_ADVISORY in a stub"
    downstream_impact: "CI/acceptance suite red even though the production change is correct (false failure) OR a stale test passes asserting now-removed bypass (false pass)."
    mitigation: "Worker MUST: (a) grep tests/ for '.delegate_mode', 'bypass', 'rc==2 / exit 2 on budget'; update over-budget assertions to expect exit 0 + additionalContext; (b) keep DECISION_BYPASS_* constants in _gate_common (other gates import them — grep showed ask_gate, go_gate, model_tag_enforcer reference DECISION_*), only ADD DECISION_ADVISORY; (c) if the test stub enumerates constants, add DECISION_ADVISORY there too. Do NOT delete the BYPASS constants from _gate_common."
    category: "invariant_violation"

  - id: "F8"
    guide_word: "OTHER"
    operation: "two-file sync (deployed + template)"
    trigger: "Worker edits only one of ~/.claude/scripts/delegate_gate.py and templates/scripts/delegate_gate.py"
    affected_state: ["byte-identity of the two copies"]
    detection: "test_delegate_gate_msg.sh A2 (cmp/diff) fails"
    downstream_impact: "Drift: next install.py overwrites the hand-edited deployed copy with the stale template (or vice-versa), silently reverting the fix."
    mitigation: "MUST apply the IDENTICAL diff to both files. Verify with `diff <deployed> <template>` returning empty. Acceptance criterion (5)."
    category: "partial_commit"

  - id: "F9"
    guide_word: "LESS"
    operation: "counter still increments-or-reads correctly for the nudge text"
    trigger: "Worker stops counting (e.g. early-returns advisory before the check) so the nudge reports a wrong/stale count"
    affected_state: [".delegate_counter", "nudge text counter value"]
    detection: "advisory text shows 0/1 or a frozen number while actions accumulate"
    downstream_impact: "Nudge is uninformative; Lead can't see how far over budget it is. Also risks NOT calling check_and_increment at all -> within-budget path breaks."
    mitigation: "MUST keep calling _atomic_check_and_increment. On incremented=False (over budget) report counter_val in the nudge. On incremented=True keep the existing within-budget allow. Counter semantics UNCHANGED — only the over-budget RESPONSE changes from exit-2 to advisory."
    category: "stale_data"

  - id: "F10"
    guide_word: "OTHER"
    operation: "gate_stats.py block-rate metric"
    trigger: "over-budget events now log decision='advisory' not 'block'; gate_stats counts only 'block'"
    affected_state: ["budget_hit_rate / block_rate report (gate_stats.py:186,236)"]
    detection: "gate_stats shows delegate block-rate ~0 post-change"
    downstream_impact: "Observability illusion: looks like the gate went silent. It didn't."
    mitigation: "OUT OF SCOPE to fix gate_stats. Worker MUST document this cascade in handover and recommend a follow-up to count 'advisory' in gate_stats. Do NOT silently ship a misleading metric without flagging it."
    category: "stale_data"

# ---------------------------------------------------------------------------
# Section 5: Invariants (boolean expressions)
# ---------------------------------------------------------------------------
invariants:
  - name: "no_exit_2_on_budget"
    expression: "over_budget_branch_reached implies (exit_code == 0)"
    violation_consequence: "sibling Agent spawns cancelled in parallel batch -> the cascade F1 the change exists to kill"
    enforcement_point: "budget-exhaustion branch return statement (~711-719)"

  - name: "fail_closed_preserved"
    expression: "(parse_ok == False) implies (exit_code == 2)"
    violation_consequence: "corrupt/adversarial stdin silently bypasses the gate"
    enforcement_point: "malformed-payload branch (~602-611) — must remain untouched"

  - name: "advisory_is_single_clean_json"
    expression: "over_budget_branch_reached implies (stdout is exactly one line AND json.loads(stdout) has key 'additionalContext')"
    violation_consequence: "harness cannot parse nudge; dropped or error (F3)"
    enforcement_point: "advisory print — must be the only stdout write on any path"

  - name: "advisory_write_failure_does_not_block"
    expression: "advisory_emit_raised_OSError implies (exit_code == 0)"
    violation_consequence: "BrokenPipe degrades to non-zero exit -> resurrects F1 cascade (F4)"
    enforcement_point: "try/except OSError around the advisory print, then return 0"

  - name: "subagent_autoskip_intact"
    expression: "is_subagent_context(data) == True implies (exit_code == 0 AND counter_not_mutated)"
    violation_consequence: "sub-agents pollute Lead counter / get spurious nudges (F6)"
    enforcement_point: "is_subagent branch — keep auto-skip, drop only bypass-attempt logging"

  - name: "delegation_reset_intact"
    expression: "tool in {Agent, TaskCreate} OR bash_is_supervisor_spawn OR bash_is_codex_worker implies (counter == 0 AND exit_code == 0)"
    violation_consequence: "advisory never self-clears; Lead stuck perpetually over budget"
    enforcement_point: "delegation_reset path (~678-685)"

  - name: "two_files_byte_identical"
    expression: "sha256(deployed_delegate_gate) == sha256(template_delegate_gate)"
    violation_consequence: "install.py reverts the fix on next run (F8)"
    enforcement_point: "test_delegate_gate_msg.sh A2"

  - name: "mode_file_inert"
    expression: "exists('.delegate_mode') implies (no read of it AND no BYPASS_HONOURED log emitted)"
    violation_consequence: "dead code path / stale bypass still honoured"
    enforcement_point: "removed _mode_disabled() — grep delegate_gate.py for MODE_FILE_REL returns nothing"

  - name: "bypass_constants_retained_in_gate_common"
    expression: "DECISION_BYPASS_HONOURED in _gate_common AND DECISION_BYPASS_REFUSED in _gate_common AND DECISION_ADVISORY in _gate_common"
    violation_consequence: "other gates (ask_gate, go_gate, model_tag_enforcer) that import DECISION_BYPASS_* break (F7)"
    enforcement_point: "_gate_common.py — ADD DECISION_ADVISORY, do NOT remove BYPASS constants"

# ---------------------------------------------------------------------------
# Section 6: Temporal gaps (quantified)
# ---------------------------------------------------------------------------
temporal_gaps:
  - between: ["unlocked_telemetry_read (base['counter'] line ~621)", "locked_check_and_increment (line ~710)"]
    duration: "~0.1-2ms (intervening regex matching + file reads in same process)"
    drifting_state:
      - var: ".delegate_counter"
        drift_mechanism: "a concurrent parallel invocation on the same project may reset (delegation) or increment between the two reads"
        drift_rate: "event-driven, only when parallel sessions/batch hit the same repo"
        stale_after: "immediately if a concurrent call mutates"
    mitigation: "The DECISION value logged in base may differ slightly from the authoritative locked counter_val — already handled today by overriding counter in the over-budget log record. Keep that override; the advisory nudge MUST report counter_val (the locked value), not base['counter']."

  - between: ["over_budget_invocation_A (advisory, no mutation)", "over_budget_invocation_B (advisory, no mutation)"]
    duration: "concurrent within one parallel tool-batch, ~0-5ms apart"
    drifting_state:
      - var: ".delegate_counter"
        drift_mechanism: "neither mutates (both return incremented=False); a THIRD sibling that is an Agent spawn resets to 0"
        drift_rate: "event-driven"
        stale_after: "until the Agent-spawn sibling commits the reset"
    mitigation: "Because no sibling now exits 2, ALL siblings run; the Agent reset lands and clears the budget for the next batch. This is the intended post-change behavior — the gap is benign by design."

  - between: ["DECISION_BLOCK schema (today)", "DECISION_ADVISORY schema (post-change)"]
    duration: "permanent after deploy (one-way migration of the decisions-log vocabulary)"
    drifting_state:
      - var: "delegate_gate_decisions.jsonl decision vocabulary"
        drift_mechanism: "new 'advisory' value appears; old rows keep 'block'"
        drift_rate: "one-time at deploy"
        stale_after: "gate_stats.py block-rate becomes misleading from deploy onward (F10)"
    mitigation: "Document in handover; flag gate_stats follow-up. Historical 'block' rows remain valid for pre-deploy analysis."

# ---------------------------------------------------------------------------
# Section 7: Cascade chains
# ---------------------------------------------------------------------------
cascade_chains:
  - trigger: "over-budget exit 2 -> exit 0 (advisory)"
    chain:
      - "harness no longer sees non-zero exit on a sibling"
      - "harness no longer cancels the parallel batch"
      - "the Agent/TaskCreate sibling actually runs"
      - "that delegation resets .delegate_counter to 0"
      - "next batch starts within budget — the deadlock that drove bypass traffic is gone"
    propagation_time: "within one tool-batch (<1s)"
    atomicity: "EVENTUAL_OK"
    current_gap: "null — this is the intended cascade"

  - trigger: "decision vocabulary gains 'advisory'"
    chain:
      - "delegate_gate logs decision='advisory' on over-budget"
      - "gate_stats.py block-rate = block/(block+allow) sees block drop to ~0"
      - "the budget-hit metric reads near-zero"
      - "an observer mistakenly concludes the gate stopped enforcing"
    propagation_time: "immediate at first over-budget event post-deploy"
    atomicity: "EVENTUAL_OK"
    current_gap: "gate_stats.py OUT OF SCOPE — Worker MUST flag in handover; follow-up task to count 'advisory'"

  - trigger: "_mode_disabled removed"
    chain:
      - "stale .delegate_mode files become no-ops"
      - "no BYPASS_HONOURED/REFUSED rows from delegate_gate"
      - "any test asserting bypass behavior must change"
      - "gate_bypass_attempts.jsonl stops growing from this gate"
    propagation_time: "immediate"
    atomicity: "REQUIRED (test updates must ship in the same change)"
    current_gap: "tests/ must be grepped + updated in the same commit (F7, D7)"

# ---------------------------------------------------------------------------
# Section 8: Worker directives (imperative)
# ---------------------------------------------------------------------------
worker_directives:
  - directive: "MUST replace the over-budget branch (delegate_gate.py ~711-719) so that on incremented==False it does: try: print(json.dumps({'additionalContext': <nudge>})) except OSError: pass; log with DECISION_ADVISORY; return 0. NEVER return 2 from this branch."
    rationale: "Eliminates F1 (sibling cancellation cascade) and F4 (write-failure regression). Mirrors require_task.py:70-72 proven-safe pattern."
    enforcement: "output_guard"

  - directive: "MUST NOT modify the malformed-payload branch (~602-611). Its return 2 is fail-closed robustness and STAYS."
    rationale: "Preserves INV fail_closed_preserved; prevents F2."
    enforcement: "body_invariant"

  - directive: "MUST add DECISION_ADVISORY = 'advisory' to _gate_common.py and import it in delegate_gate. MUST NOT remove DECISION_BYPASS_HONOURED or DECISION_BYPASS_REFUSED from _gate_common (other gates import them)."
    rationale: "Prevents F7 import breakage; gives the over-budget log a distinct decision value."
    enforcement: "body_invariant"

  - directive: "MUST remove: _mode_disabled() function (~501-522), MODE_FILE_REL constant (~131), the Lead .delegate_mode bypass branch (~653-666), and the sub-agent bypass-attempt detection+logging (the _mode_disabled call + BYPASS_REFUSED block inside the is_subagent branch ~626-643). MUST KEEP the sub-agent auto-skip (return 0) and the CLAUDE_BOOSTER_SKIP_DELEGATE_GATE env escape."
    rationale: "SECONDARY change; prevents F6 (don't kill auto-skip) while retiring dead bypass machinery."
    enforcement: "body_invariant"

  - directive: "MUST keep calling _atomic_check_and_increment(root, BUDGET) and report the returned locked counter_val in the nudge text; keep the within-budget allow path (incremented==True) unchanged."
    rationale: "Prevents F9 (stale/frozen counter in nudge) and preserves criterion (7) counter-reset semantics."
    enforcement: "state_refresh"

  - directive: "MUST apply the byte-identical diff to BOTH ~/.claude/scripts/delegate_gate.py AND templates/scripts/delegate_gate.py, and to _gate_common.py in both deployed and template locations if a template copy exists. Verify `diff` is empty."
    rationale: "Prevents F8 (install.py revert); criterion (5)."
    enforcement: "output_guard"

  - directive: "MUST ensure the advisory print is the ONLY write to stdout on every code path; the gate otherwise uses stderr only — preserve that. No debug prints to stdout."
    rationale: "Prevents F3 (corrupted JSON line); INV advisory_is_single_clean_json."
    enforcement: "output_guard"

  - directive: "MUST grep tests/ and templates/scripts/test_delegate_gate_*.sh for '.delegate_mode', 'bypass', and over-budget exit-2 assertions; update any over-budget assertion to expect exit 0 + additionalContext JSON; if a _gate_common test stub enumerates DECISION_* constants, add DECISION_ADVISORY to it. Update test_delegate_gate_msg.sh acceptance contract comment to reflect advisory (not block)."
    rationale: "Prevents F7 (false test failure or stale false pass); the test-update ships in the same change (cascade atomicity REQUIRED)."
    enforcement: "body_invariant"

  - directive: "MUST note in the handover that gate_stats.py block-rate becomes misleading (counts 'block' only, not 'advisory') and recommend a follow-up — do NOT silently ship the metric regression."
    rationale: "F10/cascade-2 transparency; gate_stats is out of scope but the side-effect is real."
    enforcement: "output_guard"

# ---------------------------------------------------------------------------
# Section 9: Verifier assertions
# ---------------------------------------------------------------------------
verifier_assertions:
  - assertion: "Over-budget counted action -> exit code 0 AND stdout is a single line that json.loads cleanly with key 'additionalContext'. (THE headline proof the cascade is eliminated.)"
    type: "branching"
    how: "Pre-seed .delegate_counter to BUDGET (=1). Feed PreToolUse JSON {tool_name:'Edit', tool_input:{file_path:'/some/code.py'}, cwd:<repo>} (non-allowlisted, IMPLEMENT phase). Capture rc + stdout. Assert rc==0 and json.loads(stdout)['additionalContext'] is a non-empty str. EXPLICITLY assert rc != 2."
    derived_from: "F1, INV no_exit_2_on_budget"

  - assertion: "Cascade impossibility: simulate the parallel-batch trap — over-budget setup action returns 0 so a sibling would survive. Direct proof: there is NO input (other than malformed stdin) that yields exit 2."
    type: "branching"
    how: "Parametrized: for tool in {Bash(non-recon), Edit, Write, NotebookEdit} with counter pre-seeded >= budget and non-allowlisted path: assert rc==0 each. Then assert ONLY malformed stdin yields rc==2."
    derived_from: "F1"

  - assertion: "Malformed stdin -> exit 2 (fail-closed preserved)."
    type: "invariant"
    how: "Pipe 'not json{{{' to the gate. Assert rc==2 and stderr mentions malformed."
    derived_from: "F2, INV fail_closed_preserved"

  - assertion: "Advisory stdout is exactly one valid JSON object — no leading/trailing garbage."
    type: "freshness"
    how: "Over-budget invocation; assert stdout.strip() parses as JSON with exactly the additionalContext key (and any intended siblings), and stdout has no second line."
    derived_from: "F3, INV advisory_is_single_clean_json"

  - assertion: "Agent / TaskCreate resets the counter and exits 0."
    type: "cascade"
    how: "Pre-seed counter=5. Feed {tool_name:'Agent'}. Assert rc==0 and .delegate_counter reads 0 afterward. Repeat for TaskCreate."
    derived_from: "INV delegation_reset_intact, criterion (7)"

  - assertion: ".delegate_mode=off:<session> is IGNORED — no bypass, no BYPASS_HONOURED log."
    type: "branching"
    how: "Write '.delegate_mode' = 'off:<sid>'. Feed an over-budget action with matching session_id. Assert behavior is identical to no-file case (exit 0 advisory) and grep the decisions log for absence of 'bypass_honoured' for this run. Also assert delegate_gate.py source contains no 'MODE_FILE_REL' / '_mode_disabled'."
    derived_from: "F7, INV mode_file_inert"

  - assertion: "Sub-agent context still auto-skips (exit 0, counter unchanged)."
    type: "invariant"
    how: "Feed {agent_id:'x', agent_type:'general-purpose', tool_name:'Edit'} with counter pre-seeded >= budget. Assert rc==0 and counter unchanged (no advisory either)."
    derived_from: "F6, INV subagent_autoskip_intact"

  - assertion: "Within-budget action still allowed, increments counter (exit 0, no advisory on stdout)."
    type: "invariant"
    how: "counter=0, BUDGET=1, feed Edit non-allowlisted. Assert rc==0, counter becomes 1, stdout empty (no additionalContext for in-budget)."
    derived_from: "F9, INV no_exit_2_on_budget (in-budget unchanged)"

  - assertion: "Both delegate_gate.py copies are byte-identical; DECISION_ADVISORY present in _gate_common."
    type: "invariant"
    how: "diff deployed vs template == empty; grep _gate_common for DECISION_ADVISORY and confirm DECISION_BYPASS_* still present."
    derived_from: "F8, INV two_files_byte_identical, bypass_constants_retained"

  - assertion: "Parse-clean: python3 -c 'import ast; ast.parse(open(p).read())' on both delegate_gate.py copies and _gate_common.py exits 0."
    type: "invariant"
    how: "ast.parse each edited file; rc==0."
    derived_from: "criterion (6)"

# ---------------------------------------------------------------------------
# Section 10: Branch tree
# ---------------------------------------------------------------------------
branch_tree:
  mermaid: |
    graph TD
      A[stdin] --> B{json parse}
      B -->|malformed| Z2[exit 2 FAIL-CLOSED — STAYS]
      B -->|valid dict| C{is_subagent?}
      C -->|yes| Z0a[auto-skip exit 0 — bypass-log REMOVED]
      C -->|no| D{env SKIP=1?}
      D -->|yes| Z0b[exit 0]
      D -->|no| E[.delegate_mode branch REMOVED — fall through]
      E --> F{phase RECON/PLAN?}
      F -->|yes| Z0c[reset + exit 0]
      F -->|no| G{delegation signal?<br/>Agent/TaskCreate/supervisor/codex}
      G -->|yes| Z0d[reset counter + exit 0]
      G -->|no| H{recon bash / non-action / allowlist?}
      H -->|yes| Z0e[exit 0]
      H -->|no| I[check_and_increment]
      I -->|within budget| Z0f[increment + exit 0]
      I -->|OVER budget| J{stdout write ok?}
      J -->|ok| Z0g[print additionalContext + log ADVISORY + exit 0 — NEW, was exit 2]
      J -->|OSError| Z0h[swallow + exit 0 — NEVER 2]
      style Z2 fill:#f99
      style Z0g fill:#9f9
      style Z0h fill:#9f9
